  <script>
    function displayBeijingTime() {
      var now = new Date();
      var year = now.getUTCFullYear();
      var month = now.getUTCMonth() + 1;
      var date = now.getUTCDate();
      var hours = now.getUTCHours() + 8; // 加 8 小时是因为北京在东八区
      var minutes = now.getUTCMinutes();
      var seconds = now.getUTCSeconds();
      
      var timeString = year + "年" + month + "月" + date + "日 " + hours + ":" + minutes + ":" + seconds;
      document.getElementById("beijing-time").innerText = timeString;
    }

    // 每秒更新一次时间
    setInterval(displayBeijingTime, 1000);

  </script>
